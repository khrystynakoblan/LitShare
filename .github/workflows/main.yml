name: Deploy LitShare to Azure

on:
  push:
    branches:
      - main 

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restore dependencies
        run: dotnet restore Source/LitShare.sln

      - name: Build project
        run: dotnet build Source/LitShare.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Source/LitShare.sln --configuration Release --no-build --verbosity normal

      - name: Publish web project
        run: dotnet publish Source/LitShare.Web/LitShare.Web.csproj --configuration Release --output ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'litshare-app'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
